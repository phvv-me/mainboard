<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <title>mainboard, a chip on the board</title>
  <!-- gold pins -->
  <g stroke="#d4a017" stroke-width="5">
    <path d="M45 33 V19 M60 33 V19 M75 33 V19"/>
    <path d="M45 87 V101 M60 87 V101 M75 87 V101"/>
    <path d="M33 45 H19 M33 60 H19 M33 75 H19"/>
    <path d="M87 45 H101 M87 60 H101 M87 75 H101"/>
  </g>
  <!-- green chip body -->
  <rect x="33" y="33" width="54" height="54" rx="11" stroke="#15803d" stroke-width="5"/>
  <!-- gold die -->
  <rect x="49" y="49" width="22" height="22" rx="5" fill="#d4a017"/>
</svg>
