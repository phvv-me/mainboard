site_name: Maquina
site_description: CPU, GPU, and NPU hardware topology for Python.
site_url: https://phvv.me/maquina/
repo_url: https://github.com/phvv-me/maquina
repo_name: phvv-me/maquina
copyright: MIT - Pedro Valois

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate

nav:
  - Home: index.md
  - API: api.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search
  - llmstxt:
      markdown_description: CPU, GPU, and NPU hardware topology and telemetry for Python.
      full_output: llms-full.txt
      sections:
        Usage:
          - index.md
        Reference:
          - api.md
